<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" fill="none">
  <style>
    text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .table-name { font-size: 13px; font-weight: 600; fill: #e0e0e0; }
    .column { font-size: 11px; fill: #999; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    .pk { fill: #a78bfa; }
    .fk { fill: #60a5fa; }
    .type-label { font-size: 9px; fill: #666; font-family: 'JetBrains Mono', monospace; }
    .section-label { font-size: 10px; fill: #555; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
    .relation-line { stroke: #333; stroke-width: 1.5; }
    .relation-line-fk { stroke: #60a5fa; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .relation-label { font-size: 9px; fill: #666; }
    .cardinality { font-size: 10px; fill: #a78bfa; font-weight: 600; }
  </style>

  <!-- Background -->
  <rect width="920" height="580" rx="12" fill="#0a0a0a"/>
  <rect x="1" y="1" width="918" height="578" rx="11" fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- ═══════════ NODES TABLE (center) ═══════════ -->
  <rect x="310" y="30" width="280" height="260" rx="8" fill="#111" stroke="#2a2a2a"/>
  <rect x="310" y="30" width="280" height="32" rx="8" fill="#1a1a2e"/>
  <rect x="310" y="54" width="280" height="8" fill="#1a1a2e"/>
  <text x="450" y="52" text-anchor="middle" class="table-name">nodes</text>
  <text x="326" y="82" class="column pk">id</text><text x="520" y="82" class="type-label">INTEGER PK</text>
  <text x="326" y="100" class="column">title</text><text x="520" y="100" class="type-label">TEXT NOT NULL</text>
  <text x="326" y="118" class="column">description</text><text x="520" y="118" class="type-label">TEXT</text>
  <text x="326" y="136" class="column">link</text><text x="520" y="136" class="type-label">TEXT</text>
  <text x="326" y="154" class="column">node_type</text><text x="520" y="154" class="type-label">TEXT</text>
  <text x="326" y="172" class="column">event_date</text><text x="520" y="172" class="type-label">TEXT</text>
  <text x="326" y="190" class="column">chunk</text><text x="520" y="190" class="type-label">TEXT</text>
  <text x="326" y="208" class="column">embedding</text><text x="520" y="208" class="type-label">F32_BLOB(1536)</text>
  <text x="326" y="226" class="column">metadata</text><text x="520" y="226" class="type-label">JSON</text>
  <text x="326" y="244" class="column">notes</text><text x="520" y="244" class="type-label">TEXT</text>
  <line x1="326" y1="250" x2="574" y2="250" stroke="#1e1e1e"/>
  <text x="326" y="268" class="column" style="fill:#555">+ created_at, updated_at</text>

  <!-- ═══════════ CHUNKS TABLE (left) ═══════════ -->
  <rect x="30" y="110" width="230" height="160" rx="8" fill="#111" stroke="#2a2a2a"/>
  <rect x="30" y="110" width="230" height="32" rx="8" fill="#1a1a2e"/>
  <rect x="30" y="134" width="230" height="8" fill="#1a1a2e"/>
  <text x="145" y="132" text-anchor="middle" class="table-name">chunks</text>
  <text x="46" y="162" class="column pk">id</text><text x="200" y="162" class="type-label">INTEGER PK</text>
  <text x="46" y="180" class="column fk">node_id</text><text x="200" y="180" class="type-label">FK → nodes</text>
  <text x="46" y="198" class="column">chunk_idx</text><text x="200" y="198" class="type-label">INTEGER</text>
  <text x="46" y="216" class="column">text</text><text x="200" y="216" class="type-label">TEXT NOT NULL</text>
  <text x="46" y="234" class="column">embedding</text><text x="200" y="234" class="type-label">F32_BLOB(1536)</text>

  <!-- chunks → nodes FK line -->
  <line x1="260" y1="180" x2="310" y2="160" class="relation-line-fk"/>
  <text x="270" y="162" class="cardinality">N</text>
  <text x="302" y="152" class="cardinality">1</text>

  <!-- ═══════════ EDGES TABLE (right) ═══════════ -->
  <rect x="650" y="80" width="240" height="170" rx="8" fill="#111" stroke="#2a2a2a"/>
  <rect x="650" y="80" width="240" height="32" rx="8" fill="#1a1a2e"/>
  <rect x="650" y="104" width="240" height="8" fill="#1a1a2e"/>
  <text x="770" y="102" text-anchor="middle" class="table-name">edges</text>
  <text x="666" y="132" class="column pk">id</text><text x="826" y="132" class="type-label">INTEGER PK</text>
  <text x="666" y="150" class="column fk">from_node_id</text><text x="826" y="150" class="type-label">FK → nodes</text>
  <text x="666" y="168" class="column fk">to_node_id</text><text x="826" y="168" class="type-label">FK → nodes</text>
  <text x="666" y="186" class="column">context</text><text x="826" y="186" class="type-label">JSON</text>
  <text x="666" y="204" class="column">source</text><text x="826" y="204" class="type-label">TEXT</text>
  <line x1="666" y1="210" x2="874" y2="210" stroke="#1e1e1e"/>
  <text x="666" y="228" class="column" style="fill:#555">+ created_at</text>

  <!-- edges → nodes FK lines -->
  <line x1="650" y1="150" x2="590" y2="100" class="relation-line-fk"/>
  <text x="632" y="140" class="cardinality">N</text>
  <text x="592" y="96" class="cardinality">1</text>
  <line x1="650" y1="168" x2="590" y2="130" class="relation-line-fk"/>

  <!-- ═══════════ DIMENSIONS TABLE (bottom left) ═══════════ -->
  <rect x="80" y="370" width="210" height="120" rx="8" fill="#111" stroke="#2a2a2a"/>
  <rect x="80" y="370" width="210" height="32" rx="8" fill="#1a1a2e"/>
  <rect x="80" y="394" width="210" height="8" fill="#1a1a2e"/>
  <text x="185" y="392" text-anchor="middle" class="table-name">dimensions</text>
  <text x="96" y="422" class="column pk">id</text><text x="226" y="422" class="type-label">INTEGER PK</text>
  <text x="96" y="440" class="column">name</text><text x="226" y="440" class="type-label">TEXT UNIQUE</text>
  <text x="96" y="458" class="column">description</text><text x="226" y="458" class="type-label">TEXT</text>
  <text x="96" y="476" class="column">is_priority</text><text x="226" y="476" class="type-label">BOOLEAN</text>

  <!-- ═══════════ NODE_DIMENSIONS JOIN (bottom center) ═══════════ -->
  <rect x="360" y="390" width="200" height="100" rx="8" fill="#111" stroke="#2a2a2a"/>
  <rect x="360" y="390" width="200" height="32" rx="8" fill="#1a1a2e"/>
  <rect x="360" y="414" width="200" height="8" fill="#1a1a2e"/>
  <text x="460" y="412" text-anchor="middle" class="table-name">node_dimensions</text>
  <text x="376" y="442" class="column fk">node_id</text><text x="496" y="442" class="type-label">FK → nodes</text>
  <text x="376" y="460" class="column fk">dimension_id</text><text x="496" y="460" class="type-label">FK → dimensions</text>

  <!-- node_dimensions → nodes FK line -->
  <line x1="460" y1="390" x2="450" y2="290" class="relation-line-fk"/>
  <text x="464" y="380" class="cardinality">N</text>
  <text x="444" y="300" class="cardinality">1</text>

  <!-- node_dimensions → dimensions FK line -->
  <line x1="360" y1="450" x2="290" y2="440" class="relation-line-fk"/>
  <text x="345" y="446" class="cardinality">N</text>
  <text x="292" y="434" class="cardinality">1</text>

  <!-- M:N label -->
  <text x="460" y="350" text-anchor="middle" class="relation-label" style="fill:#a78bfa">M:N via join table</text>

  <!-- ═══════════ CHATS TABLE (bottom right) ═══════════ -->
  <rect x="640" y="370" width="240" height="140" rx="8" fill="#111" stroke="#2a2a2a"/>
  <rect x="640" y="370" width="240" height="32" rx="8" fill="#1a1a2e"/>
  <rect x="640" y="394" width="240" height="8" fill="#1a1a2e"/>
  <text x="760" y="392" text-anchor="middle" class="table-name">chats</text>
  <text x="656" y="422" class="column pk">id</text><text x="816" y="422" class="type-label">INTEGER PK</text>
  <text x="656" y="440" class="column">thread_id</text><text x="816" y="440" class="type-label">TEXT</text>
  <text x="656" y="458" class="column">traces</text><text x="816" y="458" class="type-label">JSON</text>
  <text x="656" y="476" class="column">model</text><text x="816" y="476" class="type-label">TEXT</text>
  <text x="656" y="494" class="column">latency_ms</text><text x="816" y="494" class="type-label">INTEGER</text>

  <!-- ═══════════ CHUNKS_FTS VIRTUAL TABLE (left bottom) ═══════════ -->
  <rect x="30" y="310" width="180" height="40" rx="8" fill="#111" stroke="#333" stroke-dasharray="4 2"/>
  <text x="120" y="335" text-anchor="middle" class="column" style="fill:#666; font-size:11px">chunks_fts (FTS5 virtual)</text>

  <!-- chunks_fts → chunks -->
  <line x1="120" y1="310" x2="140" y2="270" stroke="#333" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="100" y="300" class="relation-label">auto-sync</text>

  <!-- ═══════════ LEGEND ═══════════ -->
  <rect x="30" y="530" width="860" height="30" rx="6" fill="#0d0d0d" stroke="#1a1a1a"/>
  <circle cx="56" cy="545" r="4" fill="#a78bfa"/>
  <text x="66" y="549" class="type-label" style="fill:#888">Primary Key</text>
  <circle cx="166" cy="545" r="4" fill="#60a5fa"/>
  <text x="176" y="549" class="type-label" style="fill:#888">Foreign Key</text>
  <line x1="250" y1="545" x2="280" y2="545" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="286" y="549" class="type-label" style="fill:#888">FK Relationship</text>
  <line x1="400" y1="545" x2="430" y2="545" stroke="#333" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="436" y="549" class="type-label" style="fill:#888">Virtual / Derived</text>
  <text x="580" y="549" class="type-label" style="fill:#555">Turso (libSQL) — cloud SQLite with native vector search</text>
</svg>
